<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPATHO.AI</title>
  <style>
    :root {
      --bg: #060a14;
      --bg-soft: #111932;
      --text: #edf2ff;
      --muted: #aec0e8;
      --accent: #55e1d0;
      --panel: rgba(16, 24, 48, 0.72);
      --line: #2f4570;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(1600px 700px at 6% -5%, rgba(86, 126, 255, 0.28), transparent 52%),
        radial-gradient(1200px 900px at 94% 100%, rgba(85, 225, 208, 0.24), transparent 55%),
        linear-gradient(145deg, var(--bg), var(--bg-soft));
      color: var(--text);
      font-family: Inter, "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      padding: 4rem 1.25rem;
    }

    .scene {
      width: min(980px, 100%);
      display: grid;
      gap: 2rem;
      background: var(--panel);
      border: 1px solid rgba(151, 176, 255, 0.25);
      border-radius: 24px;
      padding: clamp(1.8rem, 4.2vw, 3.4rem);
      backdrop-filter: blur(10px);
      box-shadow:
        0 24px 56px rgba(4, 9, 22, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 5vw, 3.3rem);
      letter-spacing: -0.02em;
      line-height: 1.16;
      font-weight: 650;
    }

    .loop {
      color: var(--accent);
      display: inline-block;
      white-space: nowrap;
      opacity: 1;
      transition: opacity 0.25s ease;
      margin-left: 0.35rem;
      border-right: 2px solid var(--accent);
      padding-right: 0.42rem;
      animation: caret 1.7s infinite steps(2);
    }

    .loop.fade-out {
      opacity: 0;
    }

    @keyframes caret {
      0%, 45%, 100% { border-color: transparent; }
      50%, 95% { border-color: var(--accent); }
    }

    .quote {
      margin: 0;
      border-left: 3px solid var(--accent);
      padding: 0.65rem 0 0.65rem 1rem;
      color: #d4ddff;
      font-size: clamp(1.02rem, 2.7vw, 1.35rem);
      line-height: 1.65;
      max-width: 58ch;
      font-weight: 500;
    }

    .quote span {
      display: block;
      color: #d8e0fb;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-size: 0.88em;
      margin-bottom: 0.65rem;
    }

    .contact {
      margin: 0;
      color: var(--muted);
      font-size: 1.03rem;
      line-height: 1.7;
      max-width: 64ch;
    }

    .contact a {
      color: #061025;
      background: linear-gradient(110deg, var(--accent), #9ad9ff);
      text-decoration: none;
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      margin-left: 0.35rem;
      display: inline-block;
      font-weight: 700;
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      body {
        padding: 2.2rem 0.8rem;
      }

      .scene {
        border-radius: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loop { transition: none; animation: none; }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="SPATHO.AI home summary">
    <h1>SPATHO.AI is <span id="loopText" class="loop" aria-live="polite">AI-Driven Spatial Pathologist</span></h1>

    <p class="quote">
      <span>Someone Said</span>
      "... the spatial transcriptomics for the pathologist, by the pathologist and of the pathologist shall not ..."
    </p>

    <p class="contact">
      Contact for any curiosity about what we are doing, join us, collaborate or invest:
      <a href="mailto:contact@spatho.com">contact@spatho.com</a>
    </p>
  </main>

  <script>
    const loopText = document.getElementById('loopText');
    const phrases = [
      'AI-Driven Spatial Pathologist',
      'AI-Driven Spatial Pathologist for the pathologist',
      'AI-Driven Spatial Pathologist by the pathologist',
      'AI-Driven Spatial Pathologist of the pathologist'
    ];

    let phraseIndex = 1;

    function rotatePhrase() {
      loopText.classList.add('fade-out');
      setTimeout(() => {
        loopText.textContent = phrases[phraseIndex];
        phraseIndex = (phraseIndex + 1) % phrases.length;
        loopText.classList.remove('fade-out');
      }, 220);
    }

    setInterval(rotatePhrase, 1700);
  </script>
</body>
</html>
