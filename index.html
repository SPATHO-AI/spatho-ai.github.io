<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPATHO.AI</title>
  <style>
    :root {
      --bg: #0a0f1a;
      --bg2: #141c2e;
      --text: #eef2ff;
      --muted: #abb7d8;
      --line: #2f3f69;
      --ink: #5ce3ce;
      --panel: rgba(17, 23, 42, 0.68);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
      color: var(--text);
      font-family: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(1200px 700px at 8% 2%, rgba(89, 126, 255, 0.22), transparent 55%),
        radial-gradient(900px 700px at 92% 84%, rgba(92, 227, 206, 0.20), transparent 52%),
        linear-gradient(130deg, var(--bg), var(--bg2));
    }

    main {
      width: min(900px, 100%);
      background: var(--panel);
      border: 1px solid rgba(143, 167, 250, 0.28);
      border-radius: 18px;
      padding: clamp(1.2rem, 4vw, 2rem);
      backdrop-filter: blur(9px);
      box-shadow: 0 26px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4.8vw, 2.9rem);
      line-height: 1.13;
      letter-spacing: -0.015em;
      max-width: 20ch;
      font-weight: 650;
    }

    .loopText {
      color: var(--ink);
      position: relative;
      opacity: 1;
      transition: opacity 0.25s ease;
      white-space: nowrap;
    }

    .loopText.fade-out {
      opacity: 0;
    }

    .quote {
      margin: 1.2rem 0;
      padding-left: 1rem;
      border-left: 2px solid var(--ink);
      color: var(--text);
      font-size: clamp(1rem, 2.8vw, 1.22rem);
      line-height: 1.6;
      max-width: 66ch;
    }

    .quote strong {
      color: #cfd8ff;
      font-size: 0.86em;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .contact {
      color: var(--muted);
      font-size: 0.97rem;
      line-height: 1.6;
      margin-top: 0.5rem;
    }

    .contact a {
      color: var(--bg);
      background: linear-gradient(120deg, var(--ink), #9dd9ff);
      text-decoration: none;
      font-weight: 700;
      padding: 0.15rem 0.75rem;
      border-radius: 999px;
      display: inline-block;
      margin-left: 0.3rem;
      white-space: nowrap;
    }

    @media (prefers-reduced-motion: reduce) {
      .loopText { transition: none; }
    }

    @media (max-width: 640px) {
      main {
        border-radius: 14px;
      }
    }
  </style>
</head>
  <body>
  <main>
    <h1>SPATHO.AI is <span class="loopText" id="loopText">AI-Driven Spatial Pathologist</span></h1>

    <p class="quote">
      <strong>Someone Said:</strong><br />
      “... the spatial transcriptomics for the pathologist, by the pathologist and of the pathologist shall not ...”
    </p>

    <p class="contact">
      Contact us if you are curious about what we are doing, want to join us, collaborate, or invest:
      <a href="mailto:contact@spatho.com">contact@spatho.com</a>
    </p>
  </main>

  <script>
    const loopText = document.getElementById('loopText');
    const phrases = [
      'AI-Driven Spatial Pathologist',
      'AI-Driven Spatial Pathologist, for the pathologist',
      'AI-Driven Spatial Pathologist, by the pathologist',
      'AI-Driven Spatial Pathologist, of the pathologist'
    ];

    let phraseIndex = 1;

    function runLoop() {
      loopText.classList.add('fade-out');
      setTimeout(() => {
        loopText.textContent = phrases[phraseIndex];
        phraseIndex = (phraseIndex + 1) % phrases.length;
        loopText.classList.remove('fade-out');
      }, 260);
    }

    setInterval(runLoop, 1700);
  </script>
</body>
</html>
