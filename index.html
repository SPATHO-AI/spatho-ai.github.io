<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPATHO.AI</title>
  <style>
    :root {
      --title: #4d5158;
      --quote: #5d6067;
      --button: rgba(73, 79, 88, 0.88);
      --button-hover: rgba(58, 64, 72, 0.94);
      --paper: #fbfbf7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      color: var(--title);
      background-color: var(--paper);
      background-image:
        linear-gradient(115deg, rgba(255, 255, 255, 0.72), rgba(250, 249, 241, 0.55) 52%, rgba(255, 255, 255, 0.84)),
        url("assets/hope-field.jpg");
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
      font-family: Inter, "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    main {
      width: 100%;
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 5.4rem 7vw 3.2rem;
    }

    h1 {
      margin: 0;
      color: var(--title);
      font-size: 2.15rem;
      font-weight: 430;
      letter-spacing: 0;
      line-height: 1.22;
    }

    .quote-wrap {
      align-self: center;
      justify-self: center;
      width: min(1040px, 100%);
      text-align: center;
      transform: translateY(1.2rem);
    }

    blockquote {
      margin: 0;
      color: var(--quote);
      font-size: clamp(3rem, 4.1vw, 4.15rem);
      font-style: italic;
      font-weight: 380;
      letter-spacing: 0;
      line-height: 1.32;
    }

    .contact {
      margin: 0;
      text-align: center;
      font-size: clamp(1.55rem, 2.2vw, 2rem);
      font-weight: 430;
      letter-spacing: 0;
      line-height: 1.55;
    }

    .contact a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3.15rem;
      padding: 0.22rem 1.22rem 0.3rem;
      color: rgba(255, 255, 255, 0.96);
      background: var(--button);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      box-shadow:
        0 18px 44px rgba(67, 72, 80, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .contact a:hover {
      background: var(--button-hover);
      box-shadow:
        0 22px 54px rgba(67, 72, 80, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    .contact a:focus-visible {
      outline: 2px solid #8fc9c1;
      outline-offset: 0.25rem;
    }

    @media (max-width: 820px) {
      body {
        background-attachment: scroll;
      }

      main {
        padding: 3.2rem 1.6rem 2.4rem;
      }

      h1 {
        font-size: 1.7rem;
      }

      .quote-wrap {
        transform: none;
      }

      blockquote {
        font-size: 2.15rem;
        line-height: 1.42;
      }

      .contact { font-size: 1.26rem; }
    }

    @media (max-width: 480px) {
      main {
        padding: 2.4rem 1.1rem 1.8rem;
      }

      h1 {
        font-size: 1.34rem;
      }

      blockquote {
        font-size: 1.62rem;
      }

      .contact {
        font-size: 1.08rem;
      }

      .contact a {
        min-height: 2.65rem;
        padding-inline: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>AI-Driven Spatial Pathologist</h1>

    <section class="quote-wrap">
      <blockquote>“... spatial transcriptomics of pathology, by pathologists, and for pathologists ...”</blockquote>
    </section>

    <p class="contact">
      <a href="mailto:contact@spatho.com">contact@spatho.com</a>
    </p>
  </main>
</body>
</html>
