<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPATHO.AI</title>
  <style>
    :root {
      --text: #4b4d52;
      --soft: #6a6d73;
      --quiet: #8b8f97;
      --paper: #fbfcfb;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      color: var(--text);
      background-color: var(--paper);
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.30), rgba(255, 255, 255, 0.72)),
        url("assets/hope-field.jpg");
      background-position: center;
      background-size: cover;
      font-family: Inter, "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
    }

    main {
      width: 100%;
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 5.4rem 7vw 3.2rem;
    }

    h1 {
      margin: 0;
      color: #56585e;
      font-size: 2.15rem;
      font-weight: 450;
      letter-spacing: 0;
      line-height: 1.22;
    }

    .quote-wrap {
      align-self: center;
      justify-self: center;
      width: min(980px, 100%);
      text-align: center;
      transform: translateY(1.2rem);
    }

    .quote-label {
      margin: 0 0 1.3rem;
      color: var(--quiet);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0;
    }

    blockquote {
      margin: 0;
      color: #5c5e64;
      font-size: 3rem;
      font-style: italic;
      font-weight: 430;
      letter-spacing: 0;
      line-height: 1.38;
    }

    .contact {
      margin: 0;
      color: var(--soft);
      text-align: center;
      font-size: 1.18rem;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.55;
    }

    .contact a {
      color: #5c5f66;
      text-decoration: none;
      white-space: nowrap;
    }

    .contact a:focus-visible {
      outline: 2px solid #8fc9c1;
      outline-offset: 0.25rem;
      border-radius: 0.2rem;
    }

    @media (max-width: 820px) {
      main {
        padding: 3.2rem 1.6rem 2.4rem;
      }

      h1 {
        font-size: 1.7rem;
      }

      .quote-wrap {
        transform: none;
      }

      blockquote {
        font-size: 2.05rem;
        line-height: 1.42;
      }

      .contact {
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      main {
        padding: 2.4rem 1.1rem 1.8rem;
      }

      h1 {
        font-size: 1.34rem;
      }

      .quote-label {
        margin-bottom: 0.8rem;
        font-size: 0.86rem;
      }

      blockquote {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <main aria-label="SPATHO.AI home">
    <h1>SPATHO.AI is AI-Driven Spatial Pathologist</h1>

    <section class="quote-wrap" aria-label="Someone Said">
      <p class="quote-label">Someone Said:</p>
      <blockquote>"... the spatial transcriptomics for the pathologist, by the pathologist and of the pathologist shall not ..."</blockquote>
    </section>

    <p class="contact">
      Contact us if you are curious about what we are doing, want to join us, collaborate, or invest:
      <a href="mailto:contact@spatho.com">contact@spatho.com</a>
    </p>
  </main>
</body>
</html>
